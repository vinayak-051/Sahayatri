name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Lint, test, and build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --workspace=frontend

      - name: Lint
        run: npm run lint --workspace=frontend

      - name: Unit tests
        run: npm run test --workspace=frontend

      - name: Build
        # A successful build is the equivalent of the old "does the server boot"
        # smoke test now that there's no Express backend — a broken import or
        # type error here fails the build the same way a MODULE_NOT_FOUND used
        # to crash the server on boot.
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-anon-key
        run: npm run build --workspace=frontend
